services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cadastral_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cadastral_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  external:
    build:
      context: .
      dockerfile: external_service/Dockerfile
    environment:
      EXTERNAL_MAX_DELAY_SECONDS: ${EXTERNAL_MAX_DELAY_SECONDS:-60}
    ports:
      - "8001:8001"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/cadastral_db}
      EXTERNAL_SERVICE_URL: ${EXTERNAL_SERVICE_URL:-http://external:8001/result}
      EXTERNAL_TIMEOUT_SECONDS: ${EXTERNAL_TIMEOUT_SECONDS:-65}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      external:
        condition: service_started

volumes:
  postgres_data:
